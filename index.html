<title>ClearPath — Matched Leads</title>
<style>
:root { color-scheme: light; }
* { box-sizing: border-box; }
body { margin:0; background:#f6f7f9; color:#1d2433; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; font-size:14px; line-height:1.45; }
.wrap { max-width:1360px; margin:0 auto; padding:20px; }
header.bar { display:flex; align-items:flex-start; justify-content:space-between; gap:16px; flex-wrap:wrap; }
h1 { font-size:20px; margin:0 0 2px; }
.sub { color:#5b6577; font-size:13px; margin:0; }
.updated { font-size:12px; color:#6b7280; white-space:nowrap; text-align:right; }
.controls { display:flex; gap:16px; flex-wrap:wrap; align-items:flex-end; margin:18px 0 14px; }
.ctl label { display:block; font-size:11px; text-transform:uppercase; letter-spacing:.04em; color:#6b7280; margin-bottom:4px; }
select, input[type="search"] { font-size:13px; padding:7px 10px; border:1px solid #d4d8e0; border-radius:8px; background:#fff; color:#1d2433; min-width:150px; }
.kpis { display:flex; gap:12px; flex-wrap:wrap; margin:4px 0 16px; }
.kpi { background:#fff; border:1px solid #e6e8ee; border-radius:12px; padding:12px 16px; min-width:112px; }
.kpi .n { font-size:24px; font-weight:650; }
.kpi .l { font-size:11px; text-transform:uppercase; letter-spacing:.04em; color:#6b7280; }
.tablecard { background:#fff; border:1px solid #e6e8ee; border-radius:12px; overflow:hidden; }
.scroll { max-height:70vh; overflow:auto; }
table { width:100%; border-collapse:collapse; font-size:13px; }
thead th { text-align:left; background:#f0f2f6; color:#424b5c; font-weight:600; padding:10px 12px; border-bottom:1px solid #e0e3ea; white-space:nowrap; position:sticky; top:0; }
tbody td { padding:9px 12px; border-bottom:1px solid #f0f1f5; vertical-align:top; }
tbody tr:hover { background:#fafbfc; }
tr.hot { background:#fffdf5; } tr.hot:hover { background:#fff8e6; }
.prog { display:inline-block; padding:2px 9px; border-radius:999px; font-size:11.5px; font-weight:600; background:#eef1ff; color:#2f3aa3; white-space:nowrap; }
.src { display:inline-block; padding:2px 8px; border-radius:999px; font-size:11px; font-weight:600; white-space:nowrap; }
.src.mkt { background:#e7f3ff; color:#1c5fb0; } .src.emp { background:#eaf7ee; color:#1f7a3d; }
.src.fam { background:#fdf0e7; color:#9a5212; } .src.pvt { background:#f3eefe; color:#6b3fb5; }
.src.med { background:#fdeaf0; color:#a83258; } .src.oth, .src.unk { background:#eef0f3; color:#5b6577; }
.tt { font-size:11px; font-weight:600; } .tt.transfer { color:#9a3412; } .tt.open { color:#166534; }
.fit { display:inline-block; padding:2px 8px; border-radius:999px; font-size:11px; font-weight:700; white-space:nowrap; }
.fit.hi { background:#e6f7ec; color:#1f7a3d; } .fit.md { background:#eef0f3; color:#5b6577; } .fit.lo { background:#fdeaea; color:#b4232c; }
.copybtn { margin-left:6px; border:1px solid #d4d8e0; background:#fff; border-radius:6px; font-size:11px; line-height:1; padding:2px 6px; cursor:pointer; color:#2f3aa3; vertical-align:middle; }
.copybtn:hover { background:#eef1ff; } .copybtn.ok { color:#1f7a3d; border-color:#bfe6cc; background:#eaf7ee; }
.star { color:#f5a623; font-size:15px; } .star.off { color:#dfe2ea; }
.formc { font-size:11px; color:#6b7280; font-variant-numeric:tabular-nums; white-space:nowrap; }
.formc.full { color:#1f7a3d; font-weight:700; }
.campaign { color:#424b5c; max-width:230px; }
.mono { font-variant-numeric:tabular-nums; }
.muted { color:#aab0bd; }
.empty { padding:40px 24px; text-align:center; color:#6b7280; }
.dot { display:inline-block; width:8px; height:8px; border-radius:50%; background:#2f8a4d; margin-right:6px; vertical-align:middle; }
footer.note { margin-top:14px; font-size:12px; color:#8a90a0; }
.keybox { margin-top:18px; background:#fff; border:1px solid #e6e8ee; border-radius:12px; padding:18px 20px 20px; }
.keybox h3 { margin:0 0 6px; font-size:16px; color:#1d2433; }
.keyintro { font-size:12.5px; color:#5b6577; margin:0 0 14px; }
.keygrid { display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:12px; }
.keycard { border:1px solid #eef0f4; border-radius:10px; padding:11px 13px; background:#fbfcfe; }
.keycard h4 { margin:0 0 7px; font-size:13px; color:#2f3aa3; }
.keycard h4 .w { float:right; font-size:10px; font-weight:600; color:#b4232c; text-transform:uppercase; letter-spacing:.03em; }
.keycard ul { margin:0; padding:0; list-style:none; }
.keycard li { font-size:12px; color:#3a4252; margin:4px 0; }
.keycard .up { display:inline-block; min-width:62px; font-weight:700; color:#1f7a3d; }
.keycard .dn { display:inline-block; min-width:62px; font-weight:700; color:#b4232c; }
.keycard .mid { display:inline-block; min-width:62px; font-weight:700; color:#8a6d1f; }
.keycard.tiers li { margin:5px 0; }
.keyfoot { font-size:12px; color:#5b6577; margin:14px 0 0; padding-top:12px; border-top:1px solid #eef0f4; }
</style>
</head>

<script>
const LEADS = JSON.parse(document.getElementById("leaddata").textContent);
function insSource(provider){
  const t=(provider||"").toLowerCase().replace(/[_/]+/g," ").replace(/\s+/g," ").trim();
  if(!t||t==="not sure"||t==="skip not sure") return "Unknown / Not sure";
  if(t.includes("marketplace")||t.includes("healthcare.gov")||t.includes("covered california")||t.includes("covered cali")) return "Marketplace";
  if(t.includes("employer")||t.includes("job")) return "Employer-based";
  if(t.includes("family")||t.includes("spouse")) return "Family / Spouse";
  if(t.includes("private")||t.includes("ppo")||t.includes("hmo")||t.includes("myself")) return "Private / PPO";
  if(t.includes("medicare")||t.includes("medicaid")) return "Medicare / Medicaid";
  return "Other";
}
const SRCCLASS={"Marketplace":"mkt","Employer-based":"emp","Family / Spouse":"fam","Private / PPO":"pvt","Medicare / Medicaid":"med","Other":"oth","Unknown / Not sure":"unk"};
LEADS.forEach(l=>{ l.ts=l.created?Date.parse(l.created):0; if(isNaN(l.ts)) l.ts=0; l.isrc=insSource(l.provider); });
const BUILT=new Date();
function esc(s){ return (s==null?"":String(s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function fmtDate(s){ const t=Date.parse(s); if(isNaN(t)) return s||""; const d=new Date(t); return d.toLocaleString(undefined,{month:"short",day:"numeric",year:"numeric",hour:"numeric",minute:"2-digit"}); }
function kpi(n,l){ return `<div class="kpi"><div class="n">${n}</div><div class="l">${l}</div></div>`; }
function dedupe(rows){ const seen=new Set(),out=[]; for(const r of rows){ if(r.dk){ if(seen.has(r.dk)) continue; seen.add(r.dk);} out.push(r);} return out; }
function fillSelect(id,vals){ const s=document.getElementById(id); vals.sort().forEach(v=>{const o=document.createElement("option");o.value=v;o.textContent=v;s.appendChild(o);}); }
function render(){
  const winH=parseInt(document.getElementById("window").value,10);
  const afitf=document.getElementById("afit").value;
  const isrc=document.getElementById("inssrc").value, prog=document.getElementById("program").value;
  const ptype=document.getElementById("ptype").value;
  const q=document.getElementById("q").value.trim().toLowerCase();
  let rows=LEADS.slice().sort((a,b)=>b.ts-a.ts);
  if(winH>0){ const c=Date.now()-winH*3600*1000; rows=rows.filter(r=>r.ts>=c); }
  rows=dedupe(rows);
  if(afitf) rows=rows.filter(r=>r.atier===afitf);
  if(isrc) rows=rows.filter(r=>r.isrc===isrc);
  if(prog) rows=rows.filter(r=>r.program===prog);
  if(ptype) rows=rows.filter(r=>r.ptype===ptype);
  if(q) rows=rows.filter(r=>(r.first+" "+r.last+" "+r.phone+" "+r.carrier+" "+r.provider+" "+r.isrc+" "+r.campaign+" "+r.program+" "+r.ptype+" "+r.atier+" "+r.sub+" "+r.rdy+" "+r.who+" "+r.source).toLowerCase().includes(q));
  document.getElementById("kpis").innerHTML=
    kpi(rows.length,"Leads shown")+kpi(rows.filter(r=>r.atier==="High").length,"High admit-fit")+
    kpi(rows.filter(r=>r.isrc==="Marketplace").length,"Marketplace")+
    kpi(rows.filter(r=>r.isrc==="Employer-based").length,"Employer-based")+
    kpi(new Set(rows.map(r=>r.program)).size,"Programs")+kpi(new Set(rows.map(r=>r.campaign)).size,"Campaigns")+
    kpi(rows.filter(r=>r.ptype==="TRANSFER ONLY").length,"Transfer only")+kpi(rows.filter(r=>r.ptype==="OPEN TO CLOSE").length,"Open to close");
      const tb=document.getElementById("rows");
  if(!rows.length){ tb.innerHTML='<tr><td colspan="14" class="empty">No matching leads in this window.</td></tr>'; return; }
  tb.innerHTML=rows.map(r=>`<tr>
    <td class="mono" style="white-space:nowrap">${esc(fmtDate(r.created))}</td>
    <td><span class="prog">${esc(r.program)}</span></td>
    <td><span class="fit ${r.atier==='High'?'hi':(r.atier==='Low'?'lo':'md')}" title="Priority score ${r.afit}/100">${esc(r.atier)}</span></td>
    <td>${r.first?esc(r.first):'<span class="muted">&mdash;</span>'}</td>
    <td>${r.last?esc(r.last):'<span class="muted">&mdash;</span>'}${(r.first||r.last)?` <button class="copybtn" title="Copy full name" data-copy="${esc((r.first+' '+r.last).trim())}">Copy</button>`:''}</td>
    <td class="mono">${r.phone?esc(r.phone):'<span class="muted">&mdash;</span>'}</td>
    <td class="mono" style="text-align:center">${(r.callcount!==""&&r.callcount!=null)?esc(r.callcount):'<span class="muted">&mdash;</span>'}</td>
    <td>${r.provider?esc(r.provider):'<span class="muted">&mdash;</span>'}</td>
    <td>${r.sub?esc(r.sub):'<span class="muted">&mdash;</span>'}</td>
    <td>${r.rdy?esc(r.rdy):'<span class="muted">&mdash;</span>'}</td>
    <td>${r.who?esc(r.who):'<span class="muted">&mdash;</span>'}</td>
    <td>${r.priortx?esc(r.priortx):'<span class="muted">&mdash;</span>'} <button class="copybtn" title="Copy provider, substance, readiness, self-seeker, prior treatment (tab-separated)" data-copy="${esc([r.provider,r.sub,r.rdy,r.who,r.priortx].join('\t'))}">Copy info</button></td>
    <td>${r.source?esc(r.source):'<span class="muted">&mdash;</span>'}</td>
    <td class="campaign">${esc(r.campaign)}</td>
  </tr>`).join("");
}
fillSelect("program",Array.from(new Set(LEADS.map(r=>r.program))));
["afit","inssrc","program","ptype"].forEach(id=>{ const el=document.getElementById(id),k="cpts_"+id; const sv=localStorage.getItem(k); if(sv!==null) el.value=sv; el.addEventListener("change",e=>{localStorage.setItem(k,e.target.value);render();}); });
document.getElementById("q").addEventListener("input",render);
function _fallbackCopy(text,cb){ const ta=document.createElement("textarea"); ta.value=text; ta.style.position="fixed"; ta.style.opacity="0"; document.body.appendChild(ta); ta.focus(); ta.select(); try{document.execCommand("copy");}catch(e){} document.body.removeChild(ta); if(cb)cb(); }
function _copyName(text,btn){ const _o=btn.textContent; const done=()=>{ btn.textContent="\u2713 Copied"; btn.classList.add("ok"); setTimeout(()=>{btn.textContent=_o;btn.classList.remove("ok");},1000); }; if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(text).then(done).catch(()=>_fallbackCopy(text,done)); } else { _fallbackCopy(text,done); } }
document.getElementById("rows").addEventListener("click",e=>{ const b=e.target.closest(".copybtn"); if(b){ e.stopPropagation(); _copyName(b.getAttribute("data-copy"),b); } });
document.getElementById("updated").innerHTML='<span class="dot"></span>Snapshot loaded '+BUILT.toLocaleString(undefined,{month:"short",day:"numeric",hour:"numeric",minute:"2-digit"})+'<br>Source: Clear Path Meta Leads (13)-f60185de.xlsx';
document.getElementById("note").textContent=LEADS.length.toLocaleString()+" matched leads (Meta test leads excluded). Insurance source derived from “who provides your insurance”. Upload a newer workbook to refresh; the time window is measured from the moment you open this view.";
render();
</script>
