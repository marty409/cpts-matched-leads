<script>
const LEADS = JSON.parse(document.getElementById("leaddata").textContent);
function insSource(provider){
  const t=(provider||"").toLowerCase().replace(/[_/]+/g," ").replace(/\s+/g," ").trim();
  if(!t||t==="not sure"||t==="skip not sure") return "Unknown / Not sure";
  if(t.includes("marketplace")||t.includes("healthcare.gov")||t.includes("covered california")||t.includes("covered cali")) return "Marketplace";
  if(t.includes("employer")||t.includes("job")) return "Employer-based";
  if(t.includes("family")||t.includes("spouse")) return "Family / Spouse";
  if(t.includes("private")||t.includes("ppo")||t.includes("hmo")||t.includes("myself")) return "Private / PPO";
  if(t.includes("medicare")||t.includes("medicaid")) return "Medicare / Medicaid";
  return "Other";
}
const SRCCLASS={"Marketplace":"mkt","Employer-based":"emp","Family / Spouse":"fam","Private / PPO":"pvt","Medicare / Medicaid":"med","Other":"oth","Unknown / Not sure":"unk"};
LEADS.forEach(l=>{ l.ts=l.created?Date.parse(l.created):0; if(isNaN(l.ts)) l.ts=0; l.isrc=insSource(l.provider); });
const BUILT=new Date();
function esc(s){ return (s==null?"":String(s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function fmtDate(s){ const t=Date.parse(s); if(isNaN(t)) return s||""; const d=new Date(t); return d.toLocaleString(undefined,{month:"short",day:"numeric",year:"numeric",hour:"numeric",minute:"2-digit"}); }
function kpi(n,l){ return `<div class="kpi"><div class="n">${n}</div><div class="l">${l}</div></div>`; }
function dedupe(rows){ const seen=new Set(),out=[]; for(const r of rows){ if(r.dk){ if(seen.has(r.dk)) continue; seen.add(r.dk);} out.push(r);} return out; }
function fillSelect(id,vals){ const s=document.getElementById(id); vals.sort().forEach(v=>{const o=document.createElement("option");o.value=v;o.textContent=v;s.appendChild(o);}); }
function render(){
  const winH=parseInt(document.getElementById("window").value,10);
  const afitf=document.getElementById("afit").value;
  const isrc=document.getElementById("inssrc").value, prog=document.getElementById("program").value;
  const ptype=document.getElementById("ptype").value, camp=document.getElementById("campaign").value;
  const q=document.getElementById("q").value.trim().toLowerCase();
  let rows=LEADS.slice().sort((a,b)=>b.ts-a.ts);
  if(winH>0){ const c=Date.now()-winH*3600*1000; rows=rows.filter(r=>r.ts>=c); }
  rows=dedupe(rows);
  if(afitf) rows=rows.filter(r=>r.atier===afitf);
  if(isrc) rows=rows.filter(r=>r.isrc===isrc);
  if(prog) rows=rows.filter(r=>r.program===prog);
  if(ptype) rows=rows.filter(r=>r.ptype===ptype);
  if(camp) rows=rows.filter(r=>r.campaign===camp);
  if(q) rows=rows.filter(r=>(r.first+" "+r.last+" "+r.phone+" "+r.carrier+" "+r.provider+" "+r.isrc+" "+r.campaign+" "+r.program+" "+r.ptype+" "+r.atier+" "+r.sub+" "+r.rdy+" "+r.who+" "+r.source).toLowerCase().includes(q));
  document.getElementById("kpis").innerHTML=
    kpi(rows.length,"Leads shown")+kpi(rows.filter(r=>r.atier==="High").length,"High admit-fit")+
    kpi(rows.filter(r=>r.isrc==="Marketplace").length,"Marketplace")+
    kpi(rows.filter(r=>r.isrc==="Employer-based").length,"Employer-based")+
    kpi(new Set(rows.map(r=>r.program)).size,"Programs")+kpi(new Set(rows.map(r=>r.campaign)).size,"Campaigns")+
    kpi(rows.filter(r=>r.ptype==="TRANSFER ONLY").length,"Transfer only")+kpi(rows.filter(r=>r.ptype==="OPEN TO CLOSE").length,"Open to close");
  const tb=document.getElementById("rows");
  if(!rows.length){ tb.innerHTML='<tr><td colspan="12" class="empty">No matching leads in this window.</td></tr>'; return; }
  tb.innerHTML=rows.map(r=>`<tr>
    <td class="mono" style="white-space:nowrap">${esc(fmtDate(r.created))}</td>
    <td>${r.source?esc(r.source):'<span class="muted">&mdash;</span>'}</td>
    <td><span class="fit ${r.atier==='High'?'hi':(r.atier==='Low'?'lo':'md')}" title="Admit-fit ${r.afit}\u00d7">${esc(r.atier)}</span></td>
    <td>${r.first?esc(r.first):'<span class="muted">&mdash;</span>'}</td>
    <td>${r.last?esc(r.last):'<span class="muted">&mdash;</span>'}${(r.first||r.last)?` <button class="copybtn" title="Copy full name" data-copy="${esc((r.first+' '+r.last).trim())}">Copy</button>`:''}</td>
    <td class="mono">${r.phone?esc(r.phone):'<span class="muted">&mdash;</span>'}</td>
    <td>${r.provider?esc(r.provider):'<span class="muted">&mdash;</span>'}</td>
    <td>${r.sub?esc(r.sub):'<span class="muted">&mdash;</span>'}</td>
    <td>${r.rdy?esc(r.rdy):'<span class="muted">&mdash;</span>'}</td>
    <td>${r.who?esc(r.who):'<span class="muted">&mdash;</span>'} <button class="copybtn" title="Copy provider, substance, readiness, self-seeker (tab-separated)" data-copy="${esc([r.provider,r.sub,r.rdy,r.who].join('\t'))}">Copy info</button></td>
    <td><span class="prog">${esc(r.program)}</span></td>
    <td class="campaign">${esc(r.campaign)}</td>
  </tr>`).join("");
}
fillSelect("program",Array.from(new Set(LEADS.map(r=>r.program))));
fillSelect("campaign",Array.from(new Set(LEADS.map(r=>r.campaign))));
["window","afit","inssrc","program","ptype","campaign"].forEach(id=>{ const el=document.getElementById(id),k="cpts_"+id; const sv=localStorage.getItem(k); if(sv!==null) el.value=sv; el.addEventListener("change",e=>{localStorage.setItem(k,e.target.value);render();}); });
document.getElementById("q").addEventListener("input",render);
function _fallbackCopy(text,cb){ const ta=document.createElement("textarea"); ta.value=text; ta.style.position="fixed"; ta.style.opacity="0"; document.body.appendChild(ta); ta.focus(); ta.select(); try{document.execCommand("copy");}catch(e){} document.body.removeChild(ta); if(cb)cb(); }
function _copyName(text,btn){ const _o=btn.textContent; const done=()=>{ btn.textContent="\u2713 Copied"; btn.classList.add("ok"); setTimeout(()=>{btn.textContent=_o;btn.classList.remove("ok");},1000); }; if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(text).then(done).catch(()=>_fallbackCopy(text,done)); } else { _fallbackCopy(text,done); } }
document.getElementById("rows").addEventListener("click",e=>{ const b=e.target.closest(".copybtn"); if(b){ e.stopPropagation(); _copyName(b.getAttribute("data-copy"),b); } });
document.getElementById("updated").innerHTML='<span class="dot"></span>Snapshot loaded '+BUILT.toLocaleString(undefined,{month:"short",day:"numeric",hour:"numeric",minute:"2-digit"})+'<br>Source: Clear Path Meta Leads (23).xlsx';
document.getElementById("note").textContent=LEADS.length.toLocaleString()+" matched leads (Meta test leads excluded). Insurance source derived from “who provides your insurance”. Upload a newer workbook to refresh; the 24-hour window is measured from the moment you open this view.";
render();
</script>
